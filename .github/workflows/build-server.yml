name: Build server images
on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
    contents: write

jobs:
  build-server:
    strategy:
      matrix:
        board: [rock-3a, rock-3c, rock-5a, rock-5b, rock-5b-plus, rock-5c, rock-5t, orangepi3b, orangepi4, orangepi5, orangepi5b, orangepi5-max, orangepi5-plus, orangepi5-ultra]
        branch: [legacy, vendor, edge]
        system: [noble, trixie]
        minimal: [no, yes]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install git -y
      - name: Clone repo
        run: |
          git clone --depth=1 --branch=main https://github.com/armbian/build
      - name: Build variants
        run: |
          MAIN_PARAMS="NO_APT_CACHER=no KERNEL_CONFIGURE=no COMPRESS_OUTPUTIMAGE=xz BUILD_MINIMAL=${{ matrix.minimal }} BOARD=${{ matrix.board }}"
          cd build
          ./compile.sh $MAIN_PARAMS BRANCH=${{ matrix.branch }} RELEASE=${{ matrix.system }}
      - name: Get current date
        id: date
        run: echo "::set-output name=date::$(date +'%Y%m%d')"
      - name: Publish release
        uses: softprops/action-gh-release@v1
        with:
          files: "build/output/images/**"
          tag_name: ${{ steps.date.outputs.date }}-server-images
